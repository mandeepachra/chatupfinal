<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChatUp | Premium Messenger</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f8fafc; margin: 0; height: 100vh; overflow: hidden; }
        .app-grid { display: grid; grid-template-columns: 350px 1fr 300px; height: 100vh; width: 100vw; }
        @media (max-width: 1024px) {
            .app-grid { grid-template-columns: 1fr; }
            .desktop-only { display: none; }
            .mobile-nav { display: flex; position: fixed; bottom: 0; left: 0; right: 0; height: 80px; background: #0f172a; border-top: 1px solid rgba(255,255,255,0.1); z-index: 1000; }
            .content-section { height: calc(100vh - 80px); }
        }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border-right: 1px solid rgba(255,255,255,0.05); }
        .tab-panel { display: none; height: 100%; flex-direction: column; }
        .tab-active { display: flex; }
        #loading-overlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; align-items: center; justify-content: center; }
        .letter { font-size: 3rem; font-weight: 800; font-style: italic; opacity: 0; transform: translateY(20px); animation: fadeUp 0.5s forwards; }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
        
        /* Desktop Hover Trash Icon */
        @media (min-width: 1025px) {
            .chat-item .del-btn { opacity: 0; transition: opacity 0.2s; }
            .chat-item:hover .del-btn { opacity: 1; }
        }

        /* Mobile Long Press Menu */
        #mobile-context-menu {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: none; align-items: center; justify-content: center; z-index: 3000;
            backdrop-filter: blur(8px);
        }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <div class="flex flex-col items-center">
            <img src="logo.png" class="w-20 h-20 mb-4 animate-pulse">
            <div><span class="letter" style="animation-delay:0.1s">C</span><span class="letter" style="animation-delay:0.2s">H</span><span class="letter" style="animation-delay:0.3s">A</span><span class="letter" style="animation-delay:0.4s">T</span><span class="letter" style="animation-delay:0.5s">&nbsp;</span><span class="letter" style="animation-delay:0.6s">U</span><span class="letter" style="animation-delay:0.7s">P</span></div>
        </div>
    </div>

    <div id="mobile-context-menu" onclick="this.style.display='none'">
        <div class="bg-[#1e293b] w-[85%] max-w-xs rounded-[2.5rem] overflow-hidden border border-white/10 shadow-2xl" onclick="event.stopPropagation()">
            <div class="p-6 text-center border-b border-white/5">
                <p id="menu-chat-name" class="font-bold text-white text-lg">Chat Options</p>
            </div>
            <button id="menu-del-btn" class="w-full p-5 text-left text-red-500 font-bold flex items-center gap-4 active:bg-white/5">
                <i data-lucide="trash-2"></i> Delete Chat History
            </button>
            <button onclick="document.getElementById('mobile-context-menu').style.display='none'" class="w-full p-5 text-center text-xs opacity-40 font-black uppercase tracking-widest">Cancel</button>
        </div>
    </div>

    <div id="auth-screen" class="fixed inset-0 z-[2000] bg-[#020617] flex items-center justify-center p-6 text-center">
        <div class="max-w-md w-full p-10 rounded-[2.5rem] bg-white/5 border border-white/10">
            <h1 class="text-4xl font-black text-blue-500 italic mb-2">CHAT UP</h1>
            <p class="text-gray-400 mb-10 text-sm font-medium">premium chat experience</p>
            <div id="signup-extra" class="hidden">
                <input id="reg-username" type="text" placeholder="username" class="w-full p-4 mb-4 bg-white/5 rounded-2xl border border-white/10 outline-none">
                <input id="reg-public" type="text" placeholder="Your Name" class="w-full p-4 mb-4 bg-white/5 rounded-2xl border border-white/10 outline-none">
            </div>
            <input id="auth-email" type="email" placeholder="Email" class="w-full p-4 mb-4 bg-white/5 rounded-2xl border border-white/10 outline-none">
            <input id="auth-pwd" type="password" placeholder="Password" class="w-full p-4 mb-8 bg-white/5 rounded-2xl border border-white/10 outline-none">
            <button onclick="handleAuth()" id="auth-btn" class="w-full bg-blue-600 p-5 rounded-2xl font-bold shadow-xl active:scale-95 transition-all">Sign In</button>
            <p onclick="toggleAuth()" id="toggle-text" class="mt-6 text-gray-500 cursor-pointer text-xs font-bold underline">Create Account</p>
        </div>
    </div>

    <div id="main-dashboard" class="hidden app-grid">
        <aside class="glass flex flex-col content-section">
            <div class="p-8 flex justify-between items-center">
                <div class="flex items-center gap-2"><img src="logo.png" class="w-8 h-8"><h1 class="text-2xl font-black italic text-blue-500">CHATUP</h1></div>
                <div class="relative cursor-pointer" onclick="switchTab('notif')"><i data-lucide="bell" class="text-gray-400"></i><span id="notif-dot" class="hidden absolute top-0 right-0 w-2 h-2 bg-red-500 rounded-full"></span></div>
            </div>
            <div class="px-6 mb-4"><input id="search-input" onkeyup="searchUser()" type="text" placeholder="Search people..." class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl text-xs outline-none focus:border-blue-500 transition-all"></div>
            <div class="flex-1 overflow-y-auto px-4"><div id="tab-home" class="tab-panel tab-active space-y-2"></div><div id="tab-add" class="tab-panel space-y-4"><div id="search-results" class="space-y-3"></div></div><div id="tab-notif" class="tab-panel space-y-4"><div id="notif-list" class="space-y-3"></div></div><div id="tab-settings" class="tab-panel p-4 bg-white/5 rounded-3xl border border-white/10"><h3 class="font-bold mb-4 text-xs uppercase opacity-40">Edit Profile</h3><input id="edit-username" type="text" class="w-full bg-transparent border-b border-white/20 py-2 mb-4 outline-none text-blue-400 text-sm"><input id="edit-name" type="text" class="w-full bg-transparent border-b border-white/20 py-2 mb-4 outline-none text-sm"><textarea id="edit-bio" class="w-full bg-transparent border-b border-white/20 py-2 outline-none text-sm" rows="2"></textarea><button onclick="updateProfile()" class="mt-6 w-full bg-blue-600 p-3 rounded-xl font-bold text-sm shadow-lg active:scale-95 transition-all">Save Changes</button></div></div>
        </aside>
        <main class="flex flex-col relative bg-[#020617] content-section desktop-only items-center justify-center opacity-10"><i data-lucide="message-square" class="w-32 h-32 mb-4"></i><p class="text-xl font-bold uppercase tracking-widest text-center">Select a chat to start</p></main>
        <aside class="glass desktop-only flex flex-col items-center p-10 text-center"><div id="my-pfp" class="w-24 h-24 rounded-3xl bg-blue-600 flex items-center justify-center text-4xl font-black mb-4 shadow-2xl">?</div><h2 id="my-n" class="text-xl font-bold mb-1">---</h2><p id="my-u" class="text-blue-500 text-xs font-bold mb-10">@---</p><button onclick="logout()" class="mt-auto w-full bg-red-500/10 text-red-500 p-4 rounded-2xl font-bold text-xs hover:bg-red-500 hover:text-white transition-all">Logout</button></aside>
        <nav class="mobile-nav flex justify-around items-center"><button onclick="switchTab('home')" id="m-home" class="text-blue-500"><i data-lucide="home"></i></button><button onclick="switchTab('add')" id="m-add" class="text-gray-500"><i data-lucide="user-plus"></i></button><button onclick="switchTab('notif')" id="m-notif" class="text-gray-500"><i data-lucide="bell"></i></button><button onclick="switchTab('settings')" id="m-settings" class="text-gray-500"><i data-lucide="settings"></i></button></nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, query, where, getDocs, onSnapshot, deleteDoc, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyA-ZwKwFb9HGdOeViJDEM8MZ-Gkee8OP6A", authDomain: "chatup01.firebaseapp.com", projectId: "chatup01", storageBucket: "chatup01.firebasestorage.app", messagingSenderId: "465233070635", appId: "1:465233070635:web:78f98107dc2d22dfe0386e", measurementId: "G-3Y0BKT2RFD" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        if(!sessionStorage.getItem('loaded')){
            document.getElementById('loading-overlay').style.display='flex';
            setTimeout(() => { document.getElementById('loading-overlay').style.display='none'; sessionStorage.setItem('loaded', 'true'); }, 2000);
        }

        let currentUser = null, isLogin = true;

        onAuthStateChanged(auth, async (user) => {
            if(user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-dashboard').classList.remove('hidden');
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if(userDoc.exists()){
                    currentUser = userDoc.data();
                    document.getElementById('my-pfp').innerText = currentUser.publicName[0];
                    document.getElementById('my-n').innerText = currentUser.publicName;
                    document.getElementById('my-u').innerText = "@" + currentUser.username;
                    document.getElementById('edit-username').value = currentUser.username;
                    document.getElementById('edit-name').value = currentUser.publicName;
                    document.getElementById('edit-bio').value = currentUser.bio || "";
                    listenFriends(); listenRequests();
                }
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('main-dashboard').classList.add('hidden');
            }
        });

        async function listenFriends() {
            onSnapshot(doc(db, "users", auth.currentUser.uid), async (snap) => {
                const fids = snap.data().friends || [], list = document.getElementById('tab-home');
                list.innerHTML = "";
                for(let fid of fids) {
                    const friendDoc = await getDoc(doc(db, "users", fid));
                    if(!friendDoc.exists()) continue;
                    const friend = friendDoc.data();
                    
                    const chatMeta = await getDoc(doc(db, "chats", auth.currentUser.uid + "_" + fid));
                    if(chatMeta.exists() && chatMeta.data().isHidden) continue;

                    const nickSnap = await getDoc(doc(db, "nicknames", auth.currentUser.uid + "_" + fid));
                    const displayName = nickSnap.exists() ? nickSnap.data().name : friend.publicName;

                    const cid = [auth.currentUser.uid, fid].sort().join("_");
                    const lastMsgQuery = query(collection(db, "messages", cid, "log"), orderBy("time", "desc"), limit(1));
                    const lastMsgSnap = await getDocs(lastMsgQuery);
                    let lastText = "Tap to chat";
                    if(!lastMsgSnap.empty) {
                        const mData = lastMsgSnap.docs[0].data();
                        lastText = mData.isDeleted ? "🚫 Deleted" : mData.text;
                    }
                    
                    const div = document.createElement('div');
                    div.className = "chat-item group p-4 rounded-2xl flex items-center gap-4 hover:bg-white/5 cursor-pointer border border-transparent transition-all active:scale-95";
                    
                    // LONG PRESS LOGIC
                    let timer;
                    div.addEventListener('touchstart', () => timer = setTimeout(() => showMobileMenu(fid, displayName), 600));
                    div.addEventListener('touchend', () => clearTimeout(timer));
                    div.addEventListener('touchmove', () => clearTimeout(timer));

                    div.onclick = (e) => { if(!e.target.closest('.del-btn')) window.location.href=`chat.html?fid=${fid}&fname=${encodeURIComponent(displayName)}`; };
                    div.innerHTML = `<div class="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center font-bold text-white shadow-lg">${displayName[0]}</div><div class="flex-1 overflow-hidden"><h4 class="font-bold text-sm text-white">${displayName}</h4><p class="text-[10px] opacity-30 truncate">${lastText}</p></div><button onclick="hideChat('${fid}')" class="del-btn desktop-only p-2 text-red-500/50 hover:text-red-500"><i data-lucide="trash-2" size="16"></i></button>`;
                    list.appendChild(div);
                }
                lucide.createIcons();
            });
        }

        window.showMobileMenu = (fid, name) => {
            const menu = document.getElementById('mobile-context-menu');
            document.getElementById('menu-chat-name').innerText = name;
            document.getElementById('menu-del-btn').onclick = () => { hideChat(fid); menu.style.display='none'; };
            menu.style.display = 'flex';
            lucide.createIcons();
        };

        window.hideChat = async (fid) => {
            if(!confirm("Hide this chat?")) return;
            await setDoc(doc(db, "chats", auth.currentUser.uid + "_" + fid), { isHidden: true }, { merge: true });
        };

        window.searchUser = async () => {
            const t = document.getElementById('search-input').value.toLowerCase().trim();
            if(!t) { switchTab('home'); return; }
            switchTab('add');
            const q = query(collection(db, "users"), where("username", "==", t));
            const snap = await getDocs(q);
            const box = document.getElementById('search-results');
            box.innerHTML = snap.empty ? "<p class='text-center opacity-30 text-xs mt-10'>Not found</p>" : "";
            for (const u of snap.docs) {
                const d = u.data(); if(d.uid === auth.currentUser.uid) continue;
                const iHaveHim = currentUser.friends && currentUser.friends.includes(d.uid);
                const heHasMe = d.friends && d.friends.includes(auth.currentUser.uid);
                const rCheck = await getDoc(doc(db, "requests", d.uid + "_" + auth.currentUser.uid));
                let actionHtml = "";
                if (iHaveHim && heHasMe) {
                    actionHtml = `<div class="flex gap-2"><button onclick="unhideAndChat('${d.uid}', '${d.publicName}')" class="bg-blue-600 px-3 py-1.5 rounded-lg text-[10px] font-bold shadow-lg">CHAT NOW</button><button onclick="removeFriend('${d.uid}')" class="bg-red-500/20 text-red-500 px-3 py-1.5 rounded-lg text-[10px] font-bold">REMOVE</button></div>`;
                } else if (rCheck.exists()) {
                    actionHtml = `<span class="text-[10px] text-yellow-500 font-bold uppercase">Pending</span>`;
                } else {
                    actionHtml = `<button onclick="sendRequest('${d.uid}')" class="bg-blue-600 p-2 rounded-lg"><i data-lucide="user-plus" size="18"></i></button>`;
                }
                box.innerHTML += `<div class="bg-white/5 p-4 rounded-2xl flex items-center justify-between border border-white/5 animate-fade-in"><div class="flex items-center gap-3"><div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center font-bold text-xs">${d.publicName[0]}</div><div><p class="font-bold text-xs">${d.publicName}</p><p class="text-[10px] opacity-30">@${d.username}</p></div></div><div>${actionHtml}</div></div>`;
            }
            lucide.createIcons();
        };

        window.unhideAndChat = async (fid, name) => {
            await setDoc(doc(db, "chats", auth.currentUser.uid + "_" + fid), { isHidden: false }, { merge: true });
            window.location.href = `chat.html?fid=${fid}&fname=${encodeURIComponent(name)}`;
        };

        window.removeFriend = async (fid) => {
            if(!confirm("Remove friend?")) return;
            const updated = currentUser.friends.filter(id => id !== fid);
            await updateDoc(doc(db, "users", auth.currentUser.uid), { friends: updated });
            location.reload();
        };

        window.sendRequest = async (id) => { await setDoc(doc(db, "requests", id + "_" + auth.currentUser.uid), { to: id, from: auth.currentUser.uid, fromName: currentUser.publicName, status: "pending" }); alert("Sent!"); };
        function listenRequests() { onSnapshot(query(collection(db, "requests"), where("to", "==", auth.currentUser.uid)), (snap) => { const list = document.getElementById('notif-list'), dot = document.getElementById('notif-dot'); if(!snap.empty) dot.classList.remove('hidden'); list.innerHTML = snap.empty ? "<p class='text-center opacity-20 text-xs mt-10'>No requests</p>" : ""; snap.forEach(d => { const r = d.data(); list.innerHTML += `<div class="bg-white/5 p-4 rounded-2xl flex items-center justify-between border border-white/10"><p class="text-xs font-bold">${r.fromName}</p><div class="flex gap-2"><button onclick="acceptReq('${d.id}', '${r.from}')" class="bg-blue-600 p-2 rounded-lg shadow-lg"><i data-lucide="check" size="14"></i></button><button onclick="deleteDoc(doc(db, 'requests', '${d.id}'))" class="bg-white/10 p-2 rounded-lg text-red-500"><i data-lucide="x" size="14"></i></button></div></div>`; }); lucide.createIcons(); }); }
        window.acceptReq = async (rid, fid) => { const mRef = doc(db, "users", auth.currentUser.uid), fRef = doc(db, "users", fid); const mD = (await getDoc(mRef)).data(), fD = (await getDoc(fRef)).data(); await updateDoc(mRef, { friends: [...(mD.friends || []), fid] }); await updateDoc(fRef, { friends: [...(fD.friends || []), auth.currentUser.uid] }); await deleteDoc(doc(db, "requests", rid)); };
        window.handleAuth = async () => { const email = document.getElementById('auth-email').value, pwd = document.getElementById('auth-pwd').value; try { if(isLogin) await signInWithEmailAndPassword(auth, email, pwd); else { const u = document.getElementById('reg-username').value.toLowerCase().trim(), n = document.getElementById('reg-public').value.trim(); const res = await createUserWithEmailAndPassword(auth, email, pwd); await setDoc(doc(db, "users", res.user.uid), { uid: res.user.uid, username: u, publicName: n, email, friends: [] }); } } catch(e) { alert(e.message); } };
        window.toggleAuth = () => { isLogin = !isLogin; document.getElementById('signup-extra').classList.toggle('hidden'); document.getElementById('auth-btn').innerText = isLogin ? 'Sign In' : 'Join ChatUp'; };
        window.switchTab = (t) => { document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('tab-active')); document.getElementById('tab-' + t).classList.add('tab-active'); ['home', 'add', 'notif', 'settings'].forEach(b => { const el = document.getElementById('m-' + b); if(el) { el.classList.remove('text-blue-500'); el.classList.add('text-gray-500'); } }); const activeM = document.getElementById('m-' + t); if(activeM) { activeM.classList.add('text-blue-500'); activeM.classList.remove('text-gray-500'); } lucide.createIcons(); };
        window.updateProfile = async () => { const u = document.getElementById('edit-username').value.toLowerCase().trim(), n = document.getElementById('edit-name').value, b = document.getElementById('edit-bio').value; if(u.includes(" ")) return alert("No spaces!"); await updateDoc(doc(db, "users", auth.currentUser.uid), { username: u, publicName: n, bio: b }); alert("Updated!"); location.reload(); };
        window.logout = () => { signOut(auth); location.reload(); };
        lucide.createIcons();
    </script>
</body>
</html>
