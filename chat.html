<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChatUp | Conversation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f8fafc; margin: 0; height: 100vh; display: flex; flex-direction: column; }
        .chat-me { background: linear-gradient(135deg, #2563eb, #7c3aed); border-radius: 20px 20px 4px 20px; align-self: flex-end; }
        .chat-them { background: #1e293b; border-radius: 20px 20px 20px 4px; align-self: flex-start; }
        .tick-blue { color: #4ade80; }
        .deleted-msg { font-style: italic; opacity: 0.5; font-size: 11px; }
        #msg-container::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body>
    <header class="p-5 border-b border-white/10 flex items-center justify-between bg-[#020617] sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <button onclick="window.history.back()" class="p-2 hover:bg-white/5 rounded-full transition-all active:scale-90">
                <i data-lucide="arrow-left"></i>
            </button>
            <div id="target-avatar" class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center font-bold text-lg shadow-lg">?</div>
            <div>
                <h2 id="target-name" class="font-bold text-sm tracking-tight text-white">---</h2>
                <p class="text-[10px] text-green-500 font-bold uppercase tracking-widest">Active Now</p>
            </div>
        </div>
        <button onclick="deleteFullChat()" class="text-red-500/50 hover:text-red-500"><i data-lucide="trash-2" size="20"></i></button>
    </header>

    <div id="msg-container" class="flex-1 overflow-y-auto p-6 flex flex-col gap-5"></div>

    <div class="p-5 bg-[#020617] border-t border-white/5">
        <div class="flex items-center gap-3 bg-white/5 p-2 rounded-2xl border border-white/10 focus-within:border-blue-500 transition-all">
            <input id="chat-input" type="text" placeholder="Type your message..." class="flex-1 bg-transparent p-3 outline-none text-sm text-white">
            <button onclick="sendMsg()" class="bg-blue-600 p-4 rounded-xl shadow-xl hover:bg-blue-700 active:scale-90 transition-all">
                <i data-lucide="send" size="18"></i>
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, collection, query, onSnapshot, addDoc, serverTimestamp, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

       // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyA-ZwKwFb9HGdOeViJDEM8MZ-Gkee8OP6A",
  authDomain: "chatup01.firebaseapp.com",
  projectId: "chatup01",
  storageBucket: "chatup01.firebasestorage.app",
  messagingSenderId: "465233070635",
  appId: "1:465233070635:web:78f98107dc2d22dfe0386e",
  measurementId: "G-3Y0BKT2RFD"
};

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const targetId = urlParams.get('fid');
        const targetName = urlParams.get('fname');

        document.getElementById('target-name').innerText = targetName;
        document.getElementById('target-avatar').innerText = targetName ? targetName[0] : "?";

        // ENTER KEY LOGIC
        document.getElementById('chat-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                sendMsg();
            }
        });

        // NOTIFICATION HELPER
        window.showPush = (t, b) => {
            if (Notification.permission === 'granted') {
                navigator.serviceWorker.ready.then(reg => {
                    reg.showNotification(t, { body: b, icon: 'logo.png', badge: 'logo.png' });
                });
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user && targetId) {
                listenMessages(user.uid);
            } else if (!user) {
                window.location.href = "index.html";
            }
        });

        function listenMessages(myId) {
            const cid = [myId, targetId].sort().join("_");
            const q = query(collection(db, "messages", cid, "log"), orderBy("time", "asc"));
            
            onSnapshot(q, (snap) => {
                const box = document.getElementById('msg-container');
                box.innerHTML = "";
                snap.forEach(m => {
                    const d = m.data();
                    const isMe = d.sender === myId;
                    
                    if(!isMe && d.status !== 'read') {
                        updateDoc(doc(db, "messages", cid, "log", m.id), { status: 'read' });
                    }
                    
                    // Notification Logic: Agar naya message hai aur me sender nahi hu
                    if(!isMe && d.status !== 'read' && (Date.now() - d.time?.toMillis() < 2000)) {
                        showPush(targetName, d.text);
                    }

                    if(d.deletedBy && d.deletedBy.includes(myId)) return;

                    let content = d.isDeleted ? `<span class="deleted-msg">Message deleted</span>` : d.text;
                    let ticks = isMe && !d.isDeleted ? `<span class="ml-2">${d.status === 'read' ? '<i data-lucide="check-check" class="tick-blue w-3 h-3"></i>' : '<i data-lucide="check" class="tick-gray w-3 h-3"></i>'}</span>` : '';
                    
                    box.innerHTML += `
                        <div class="p-4 max-w-[85%] text-sm font-medium ${isMe ? 'chat-me' : 'chat-them'} flex items-end shadow-sm animate-fade-in">
                            <span class="break-words">${content}</span>
                            ${ticks}
                        </div>`;
                });
                box.scrollTop = box.scrollHeight;
                lucide.createIcons();
            });
        }

        window.sendMsg = async () => {
            const input = document.getElementById('chat-input');
            const txt = input.value.trim();
            if(!txt) return;
            input.value = "";
            const cid = [auth.currentUser.uid, targetId].sort().join("_");
            await addDoc(collection(db, "messages", cid, "log"), {
                text: txt, sender: auth.currentUser.uid, time: serverTimestamp(), status: 'sent', isDeleted: false
            });
        };

        window.deleteFullChat = async () => {
            if(!confirm("Delete this chat?")) return;
            const cid = [auth.currentUser.uid, targetId].sort().join("_");
            const msgs = await getDocs(collection(db, "messages", cid, "log"));
            for (const m of msgs.docs) {
                const d = m.data();
                await updateDoc(doc(db, "messages", cid, "log", m.id), { deletedBy: [...(d.deletedBy || []), auth.currentUser.uid] });
            }
            window.history.back();
        };

        lucide.createIcons();
    </script>
</body>
</html>
