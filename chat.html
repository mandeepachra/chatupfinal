<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ChatUp | Conversation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background: #020617; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { display: flex; flex-direction: column; }
        #msg-container { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 1.5rem; display: flex; flex-direction: column; gap: 1.25rem; }
        #msg-container::-webkit-scrollbar { width: 0px; }
        .chat-me { background: linear-gradient(135deg, #2563eb, #7c3aed); border-radius: 20px 20px 4px 20px; align-self: flex-end; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.2); }
        .chat-them { background: #1e293b; border-radius: 20px 20px 20px 4px; align-self: flex-start; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2); }
        .tick-blue { color: #4ade80; }
        .deleted-msg { font-style: italic; opacity: 0.5; font-size: 11px; }
        .animate-pop { animation: pop 0.2s ease-out; }
        @keyframes pop { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body onclick="document.getElementById('msg-options').classList.add('hidden')">
    <div id="msg-options" class="fixed inset-0 bg-black/60 hidden z-[100] items-center justify-center p-6" onclick="this.classList.add('hidden')">
        <div class="bg-[#1e293b] w-full max-w-xs rounded-[2rem] overflow-hidden border border-white/10 shadow-2xl" onclick="event.stopPropagation()">
            <button onclick="confirmDelete('me')" class="w-full p-5 text-left text-sm font-bold border-b border-white/5 active:bg-white/5">Delete for me</button>
            <button id="del-everyone-btn" onclick="confirmDelete('everyone')" class="w-full p-5 text-left text-sm font-bold text-red-400 active:bg-white/5">Delete for everyone</button>
            <button onclick="document.getElementById('msg-options').classList.add('hidden')" class="w-full p-5 text-center text-xs opacity-50 font-bold">Cancel</button>
        </div>
    </div>

    <div id="profile-modal" class="fixed inset-0 bg-black/95 hidden z-[200] flex-col items-center p-10">
        <button onclick="document.getElementById('profile-modal').classList.add('hidden')" class="absolute top-6 left-6 p-2 bg-white/5 rounded-full"><i data-lucide="arrow-left"></i></button>
        <div id="prof-pfp" class="w-32 h-32 rounded-[2.5rem] bg-blue-600 flex items-center justify-center text-5xl font-black mb-6 shadow-2xl">?</div>
        <h2 id="prof-name" class="text-2xl font-bold mb-1 text-white">---</h2>
        <p id="prof-user" class="text-blue-500 text-sm mb-10 font-bold">@---</p>
        <div class="w-full max-w-xs bg-white/5 p-8 rounded-[2rem] border border-white/10 text-center">
            <p class="text-[10px] opacity-40 uppercase font-black mb-4 tracking-widest">Set Nickname (Only for you)</p>
            <input id="nick-input" type="text" placeholder="Type here..." class="w-full bg-transparent border-b border-white/20 py-2 outline-none text-center mb-6 focus:border-blue-500 text-white font-bold">
            <button onclick="saveNickname()" class="w-full bg-blue-600 p-4 rounded-2xl font-bold text-sm shadow-xl active:scale-95 transition-all">Apply Nickname</button>
        </div>
    </div>

    <header class="p-4 border-b border-white/10 flex items-center justify-between bg-[#020617] shrink-0">
        <div class="flex items-center gap-4">
            <button onclick="window.history.back()" class="p-2 active:bg-white/5 rounded-full"><i data-lucide="arrow-left"></i></button>
            <div id="target-avatar" class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center font-bold text-lg shadow-lg cursor-pointer">?</div>
            <div class="cursor-pointer" onclick="openProfile()">
                <h2 id="target-name" class="font-bold text-sm text-white">---</h2>
                <p class="text-[10px] text-green-500 font-bold uppercase tracking-widest">Active</p>
            </div>
        </div>
        <button onclick="deleteFullChat()" class="p-2 text-red-500/50 active:text-red-500"><i data-lucide="trash-2" size="20"></i></button>
    </header>

    <div id="msg-container"></div>

    <div class="p-4 bg-[#020617] border-t border-white/5 shrink-0">
        <div class="flex items-center gap-3 bg-white/5 p-1.5 rounded-2xl border border-white/10 focus-within:border-blue-500 transition-all">
            <input id="chat-input" type="text" placeholder="Type message..." class="flex-1 bg-transparent p-3 outline-none text-sm text-white">
            <button onclick="sendMsg()" class="bg-blue-600 p-3.5 rounded-xl shadow-xl active:scale-90 transition-all"><i data-lucide="send" size="18"></i></button>
        </div>
        <div class="h-[safe-area-inset-bottom]"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, collection, query, onSnapshot, addDoc, serverTimestamp, orderBy, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyA-ZwKwFb9HGdOeViJDEM8MZ-Gkee8OP6A", authDomain: "chatup01.firebaseapp.com", projectId: "chatup01", storageBucket: "chatup01.firebasestorage.app", messagingSenderId: "465233070635", appId: "1:465233070635:web:78f98107dc2d22dfe0386e", measurementId: "G-3Y0BKT2RFD" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const targetId = urlParams.get('fid'), targetName = urlParams.get('fname');
        document.getElementById('target-name').innerText = targetName;
        document.getElementById('target-avatar').innerText = targetName ? targetName[0] : "?";

        let selectedMsgId = null, selectedMsgSender = null;

        document.getElementById('chat-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMsg(); });

        onAuthStateChanged(auth, async (user) => { 
            if (user && targetId) {
                const nickSnap = await getDoc(doc(db, "nicknames", user.uid + "_" + targetId));
                if(nickSnap.exists()) {
                    document.getElementById('target-name').innerText = nickSnap.data().name;
                    document.getElementById('target-avatar').innerText = nickSnap.data().name[0];
                }
                listenMessages(user.uid); 
            } else if (!user) window.location.href="index.html"; 
        });

        window.openProfile = async () => {
            const friend = (await getDoc(doc(db, "users", targetId))).data();
            document.getElementById('prof-pfp').innerText = friend.publicName[0];
            document.getElementById('prof-name').innerText = friend.publicName;
            document.getElementById('prof-user').innerText = "@" + friend.username;
            const nickSnap = await getDoc(doc(db, "nicknames", auth.currentUser.uid + "_" + targetId));
            if(nickSnap.exists()) document.getElementById('nick-input').value = nickSnap.data().name;
            document.getElementById('profile-modal').classList.remove('hidden');
            lucide.createIcons();
        };

        window.saveNickname = async () => {
            const val = document.getElementById('nick-input').value.trim();
            if(!val) return;
            await setDoc(doc(db, "nicknames", auth.currentUser.uid + "_" + targetId), { name: val });
            alert("Nickname Saved!");
            location.reload();
        };

        function listenMessages(myId) {
            const cid = [myId, targetId].sort().join("_");
            onSnapshot(query(collection(db, "messages", cid, "log"), orderBy("time", "asc")), (snap) => {
                const box = document.getElementById('msg-container'); box.innerHTML = "";
                snap.forEach(m => {
                    const d = m.data(); const isMe = d.sender === myId;
                    if(!isMe && d.status !== 'read') updateDoc(doc(db, "messages", cid, "log", m.id), { status: 'read' });
                    if(!isMe && d.status !== 'read' && (Date.now() - d.time?.toMillis() < 2500)) if(window.Notification?.permission === 'granted') new Notification(targetName, { body: d.text, icon: 'logo.png' });
                    if(d.deletedBy && d.deletedBy.includes(myId)) return;
                    let content = d.isDeleted ? `<span class="deleted-msg">🚫 This message was deleted</span>` : d.text;
                    let ticks = isMe && !d.isDeleted ? `<span class="ml-2">${d.status === 'read' ? '<i data-lucide="check-check" class="tick-blue w-3 h-3"></i>' : '<i data-lucide="check" class="opacity-30 w-3 h-3"></i>'}</span>` : '';
                    box.innerHTML += `<div onclick="openMsgMenu('${m.id}', '${d.sender}')" class="animate-pop p-4 max-w-[85%] text-sm font-medium ${isMe ? 'chat-me' : 'chat-them'} flex items-end shadow-lg active:scale-95 transition-all cursor-pointer"><span class="break-words">${content}</span>${ticks}</div>`;
                });
                box.scrollTop = box.scrollHeight; lucide.createIcons();
            });
        }

        window.openMsgMenu = (id, sender) => {
            selectedMsgId = id; selectedMsgSender = sender;
            const menu = document.getElementById('msg-options');
            document.getElementById('del-everyone-btn').style.display = (sender === auth.currentUser.uid) ? 'block' : 'none';
            menu.classList.remove('hidden'); menu.classList.add('flex');
        };

        window.confirmDelete = async (type) => {
            const cid = [auth.currentUser.uid, targetId].sort().join("_");
            const ref = doc(db, "messages", cid, "log", selectedMsgId);
            if(type === 'everyone') await updateDoc(ref, { isDeleted: true });
            else { const d = (await getDoc(ref)).data(); await updateDoc(ref, { deletedBy: [...(d.deletedBy || []), auth.currentUser.uid] }); }
        };

        window.sendMsg = async () => { const input = document.getElementById('chat-input'); const txt = input.value.trim(); if(!txt) return; input.value = ""; const cid = [auth.currentUser.uid, targetId].sort().join("_"); await addDoc(collection(db, "messages", cid, "log"), { text: txt, sender: auth.currentUser.uid, time: serverTimestamp(), status: 'sent', isDeleted: false }); };
        window.deleteFullChat = async () => { if(!confirm("Delete chat?")) return; const cid = [auth.currentUser.uid, targetId].sort().join("_"); const msgs = await getDocs(collection(db, "messages", cid, "log")); for (const m of msgs.docs) { const d = m.data(); await updateDoc(doc(db, "messages", cid, "log", m.id), { deletedBy: [...(d.deletedBy || []), auth.currentUser.uid] }); } window.history.back(); };
        lucide.createIcons();
    </script>
</body>
</html>
